name: Lighthouse

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    # Phase A: informational — do not block merges on scores yet.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSJ9.placeholder
          SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSJ9.placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder_for_ci_build_only
          STRIPE_WEBHOOK_SECRET: whsec_placeholder_for_ci_build_only
      - run: npm run start &
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSJ9.placeholder
          SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSJ9.placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder_for_ci_build_only
          STRIPE_WEBHOOK_SECRET: whsec_placeholder_for_ci_build_only
      - name: Wait for server
        run: npx --yes wait-on http://127.0.0.1:3000 --timeout 120000
      # Phase B hard-fail thresholds (enable when lab variance is understood):
      #   - Remove `continue-on-error: true` on this job.
      #   - Uncomment `configPath: lighthouserc.json` below.
      #   - Flip assertions in lighthouserc.json from "warn" → "error".
      #
      # Suggested Phase B gates (mobile, throttled):
      #   categories.performance  minScore 0.75
      #   largest-contentful-paint  maxNumericValue 3500 ms
      #   total-blocking-time     maxNumericValue 400 ms
      #   cumulative-layout-shift   maxNumericValue 0.10
      #   first-contentful-paint    maxNumericValue 2500 ms
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:3000/
            http://127.0.0.1:3000/fleet
            http://127.0.0.1:3000/booking
            http://127.0.0.1:3000/admin/bookings
          uploadArtifacts: true
          temporaryPublicStorage: true
          # configPath: lighthouserc.json
