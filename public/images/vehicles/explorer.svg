<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F1335;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D1B4E;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid5" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4C2B7F" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGradient5)"/>

  <!-- Grid Pattern -->
  <rect width="800" height="500" fill="url(#grid5)"/>

  <!-- Large SUV Silhouette -->
  <g transform="translate(400, 220)">
    <!-- Car body - Large SUV, boxy -->
    <path d="M -100 -40 L -70 -65 L 70 -65 L 100 -40 L 100 22 Q 100 45 82 45 L -82 45 Q -100 45 -100 22 Z" fill="#7C3AED" opacity="0.7"/>
    <!-- Large windows -->
    <rect x="-70" y="-55" width="40" height="32" rx="4" fill="#9F7AEA" opacity="0.6"/>
    <rect x="30" y="-55" width="40" height="32" rx="4" fill="#9F7AEA" opacity="0.6"/>
    <!-- Roof rack - larger -->
    <line x1="-70" y1="-65" x2="70" y2="-65" stroke="#9F7AEA" stroke-width="4" opacity="0.6"/>
    <line x1="-60" y1="-72" x2="-60" y2="-62" stroke="#9F7AEA" stroke-width="2" opacity="0.6"/>
    <line x1="-10" y1="-72" x2="-10" y2="-62" stroke="#9F7AEA" stroke-width="2" opacity="0.6"/>
    <line x1="40" y1="-72" x2="40" y2="-62" stroke="#9F7AEA" stroke-width="2" opacity="0.6"/>
    <!-- Wheels - large for SUV -->
    <circle cx="-62" cy="52" r="22" fill="#4C2B7F" stroke="#7C3AED" stroke-width="3"/>
    <circle cx="62" cy="52" r="22" fill="#4C2B7F" stroke="#7C3AED" stroke-width="3"/>
    <!-- Wheel details -->
    <circle cx="-62" cy="52" r="13" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <circle cx="62" cy="52" r="13" fill="none" stroke="#7C3AED" stroke-width="2"/>
  </g>

  <!-- Vehicle Name -->
  <text x="400" y="130" font-size="64" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Ford Explorer</text>

  <!-- Category Badge -->
  <g>
    <rect x="280" y="160" width="240" height="50" rx="25" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <text x="400" y="193" font-size="24" text-anchor="middle" fill="#7C3AED" font-family="Arial, sans-serif">SUV • $75/day</text>
  </g>

  <!-- Photo Coming Soon -->
  <text x="400" y="460" font-size="18" text-anchor="middle" fill="#A0AEC0" font-family="Arial, sans-serif">Photo Coming Soon</text>
</svg>