<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bgGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F1335;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D1B4E;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid6" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4C2B7F" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGradient6)"/>

  <!-- Grid Pattern -->
  <rect width="800" height="500" fill="url(#grid6)"/>

  <!-- Truck Silhouette -->
  <g transform="translate(400, 220)">
    <!-- Truck cab -->
    <path d="M -95 -40 L -65 -62 L -10 -62 L -10 -35 L -95 -35 Z" fill="#7C3AED" opacity="0.7"/>
    <!-- Truck bed -->
    <path d="M -8 -35 L 5 -35 L 100 -25 L 100 28 L -8 28 Z" fill="#7C3AED" opacity="0.6"/>
    <!-- Cab windows -->
    <rect x="-85" y="-50" width="28" height="20" rx="3" fill="#9F7AEA" opacity="0.6"/>
    <rect x="-50" y="-50" width="28" height="20" rx="3" fill="#9F7AEA" opacity="0.6"/>
    <!-- Truck bed detail - grille pattern -->
    <line x1="10" y1="-20" x2="95" y2="-12" stroke="#9F7AEA" stroke-width="2" opacity="0.5"/>
    <line x1="10" y1="0" x2="95" y2="8" stroke="#9F7AEA" stroke-width="2" opacity="0.5"/>
    <line x1="10" y1="20" x2="95" y2="28" stroke="#9F7AEA" stroke-width="2" opacity="0.5"/>
    <!-- Wheels - large for truck -->
    <circle cx="-55" cy="50" r="22" fill="#4C2B7F" stroke="#7C3AED" stroke-width="3"/>
    <circle cx="60" cy="50" r="22" fill="#4C2B7F" stroke="#7C3AED" stroke-width="3"/>
    <!-- Wheel details -->
    <circle cx="-55" cy="50" r="13" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <circle cx="60" cy="50" r="13" fill="none" stroke="#7C3AED" stroke-width="2"/>
  </g>

  <!-- Vehicle Name -->
  <text x="400" y="130" font-size="64" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Ford F-150</text>

  <!-- Category Badge -->
  <g>
    <rect x="280" y="160" width="240" height="50" rx="25" fill="none" stroke="#7C3AED" stroke-width="2"/>
    <text x="400" y="193" font-size="24" text-anchor="middle" fill="#7C3AED" font-family="Arial, sans-serif">Truck • $70/day</text>
  </g>

  <!-- Photo Coming Soon -->
  <text x="400" y="460" font-size="18" text-anchor="middle" fill="#A0AEC0" font-family="Arial, sans-serif">Photo Coming Soon</text>
</svg>