<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="blogGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F1335;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D1B4E;stop-opacity:1" />
    </linearGradient>
    <pattern id="blogGrid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4C2B7F" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#blogGradient1)"/>

  <!-- Grid Pattern -->
  <rect width="800" height="400" fill="url(#blogGrid1)"/>

  <!-- Road/Path Icon -->
  <g transform="translate(150, 150)">
    <!-- Road lines -->
    <path d="M 50 -40 L 50 60" stroke="#7C3AED" stroke-width="8" opacity="0.8"/>
    <path d="M 50 -40 L 50 60" stroke="#FCD34D" stroke-width="4" stroke-dasharray="10,10" opacity="0.7"/>

    <!-- Curved path -->
    <path d="M 20 20 Q 60 40 80 70" stroke="#9F7AEA" stroke-width="6" fill="none" opacity="0.6"/>

    <!-- Direction arrows -->
    <g transform="translate(50, 10)">
      <polygon points="0,-8 -6,8 6,8" fill="#FCD34D" opacity="0.8"/>
    </g>
    <g transform="translate(80, 65)">
      <polygon points="0,-8 -6,8 6,8" fill="#FCD34D" opacity="0.8"/>
    </g>

    <!-- Map pins -->
    <circle cx="50" cy="-35" r="12" fill="#FCD34D" opacity="0.8"/>
    <circle cx="80" cy="70" r="12" fill="#7C3AED" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="400" y="200" font-size="52" font-weight="bold" text-anchor="middle" fill="white" font-family="Arial, sans-serif">Road Trip Planning</text>

  <!-- Subtitle -->
  <text x="400" y="250" font-size="20" text-anchor="middle" fill="#A0AEC0" font-family="Arial, sans-serif">Tips & Guide</text>

  <!-- Decorative elements -->
  <circle cx="650" cy="100" r="35" fill="#7C3AED" opacity="0.2"/>
  <circle cx="100" cy="300" r="45" fill="#9F7AEA" opacity="0.2"/>
</svg>