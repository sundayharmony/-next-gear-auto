<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Next Gear Auto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <header>
        <nav class="nav-container">
            <div class="logo">Next Gear Auto</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#fleet">Fleet</a></li>
                <li><a href="index.html#book">Book</a></li>
            </ul>
        </nav>
    </header>

    <!-- Unified Login Section -->
    <section id="login-section" class="admin-login-section">
        <div class="admin-login-card">
            <h1>Sign In</h1>
            <div class="auth-tabs">
                <button class="auth-tab active" id="signin-tab">Sign In</button>
                <button class="auth-tab" id="signup-tab">Sign Up</button>
            </div>
            
            <form id="unified-login-form" novalidate>
                <div id="signin-form" class="auth-form-content active">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" required>
                    </div>
                    <button type="button" class="btn btn-primary btn-full" id="login-btn">Sign In</button>
                    <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 0.875rem;">
                        Sign in as Admin or Customer
                    </p>
                </div>
                
                <div id="signup-form" class="auth-form-content">
                    <div class="form-group">
                        <label for="signup-name">Name</label>
                        <input type="text" id="signup-name" name="name">
                    </div>
                    <div class="form-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" name="email">
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" name="password">
                    </div>
                    <div class="form-group">
                        <label for="signup-confirm-password">Confirm Password</label>
                        <input type="password" id="signup-confirm-password" name="confirm-password">
                    </div>
                    <div class="form-group">
                        <label for="signup-phone">Phone (Optional)</label>
                        <input type="tel" id="signup-phone" name="phone">
                    </div>
                    <button type="button" class="btn btn-primary btn-full" id="signup-btn">Sign Up</button>
                    <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 0.875rem;">
                        Create a customer account
                    </p>
                </div>
            </form>
            <div id="login-message" class="auth-message" style="display: none;"></div>
        </div>
    </section>

    <script src="utils.js"></script>
    <script src="admin.js"></script>
    <script src="login.js"></script>
</body>
</html>
